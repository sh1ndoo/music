    <style>
        /* Базовые настройки и цвета */
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Блок профиля (Аватар и имя) */
        .profile {
            margin-bottom: 40px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #333;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* Блок релизов (Песня) */
        .release {
            border-radius: 12px;
            padding: 30px 20px;
            margin-bottom: 40px;
        }

        .release h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 25px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tracks-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .track {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .track-cover {
            width: 100%;
            max-width: 250px;
            height: 250px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #444;
            margin-bottom: 15px;
        }

        .track-title {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            max-width: 250px;
        }

        /* --- Стили для иконок музыкальных площадок --- */
        .platform-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }

        .platform-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #333; /* Цвет кружка по умолчанию */
            color: #ffffff; /* Цвет иконки по умолчанию */
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .platform-link svg {
            width: 25px;
            height: 25px;
            fill: currentColor;
        }

        /* Цвета при наведении */
        .platform-link.yandex:hover {
            background-color: #ffcc00;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.4);
        }

        .platform-link.spotify:hover {
            background-color: #1db954;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(29, 185, 84, 0.4);
        }

        .platform-link.apple:hover {
            background-color: #fa243c;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(250, 36, 60, 0.4);
        }
        /* ------------------------------------------- */

        /* Блок контактов */
        .contacts h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .contact-links {
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 15px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-telegram {
            background-color: #27A5E7;
        }

        .btn-email {
            background-color: #333;
            border: 1px solid #555;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
    </style>
